<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>勉強計画作成アシスタント - 中学受験ナビ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@400;500;700&display=swap"
        rel="stylesheet">
    <style>
        body {
            font-family: 'Zen Kaku Gothic New', sans-serif;
            background-color: #fafafa;
        }

        .animate-fade-in {
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 4px 20px 0 rgba(0, 0, 0, 0.05);
        }

        .message-bubble {
            max-width: 85%;
            padding: 12px 18px;
            border-radius: 15px;
            margin-bottom: 12px;
            font-size: 0.95rem;
            line-height: 1.6;
        }

        :root {
            --theme-color: #0369a1;
            /* Blue theme for planner */
            --theme-light: rgba(3, 105, 161, 0.05);
        }

        .bg-theme {
            background-color: var(--theme-color);
            color: #fff;
        }

        .text-theme {
            color: var(--theme-color);
        }

        .border-theme {
            border-color: var(--theme-color);
        }

        .bg-theme-light {
            background-color: var(--theme-light);
        }
    </style>
</head>

<body class="text-gray-800 flex flex-col h-screen overflow-hidden">

    <!-- Header -->
    <header class="bg-theme shadow-lg z-50 flex-none">
        <div class="container mx-auto px-6 py-4 flex justify-between items-center">
            <h1 class="text-xl font-bold tracking-wider flex items-center gap-3 text-white">
                <a href="kichijo_guide.html" class="hover:opacity-80 transition">🎓 中学受験ナビ</a>
                <span class="text-gray-300 text-sm">/</span>
                <span>📝 勉強計画作成アシスタント</span>
            </h1>
            <div>
                <button onclick="openPrintablePlan()"
                    class="bg-white text-theme font-bold py-2 px-4 rounded-lg shadow-sm hover:opacity-90 transition text-sm flex items-center">
                    <svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M17 17h2a2 2 0 002-2v-4a2 2 0 00-2-2H5a2 2 0 00-2 2v4a2 2 0 002 2h2m2 4h6a2 2 0 002-2v-4a2 2 0 00-2-2H9a2 2 0 00-2 2v4a2 2 0 002 2zm8-12V5a2 2 0 00-2-2H9a2 2 0 00-2 2v4h10z">
                        </path>
                    </svg>
                    印刷ページを開く
                </button>
            </div>
        </div>
    </header>

    <!-- Main Chat Area -->
    <main class="flex-1 container mx-auto px-4 py-6 max-w-4xl flex flex-col h-full hidden-scrollbar overflow-hidden">
        <div
            class="bg-theme-light p-4 rounded-xl mb-4 border border-blue-100 flex-none hidden md:block animate-fade-in">
            <p class="text-sm text-gray-700 flex items-center">
                <span class="text-xl mr-3">💡</span>
                休日のスケジュールや、苦手科目の克服メニューを専属AIコーチと相談しながら作成しましょう。できあがったら右上の「印刷ページを開く」で綺麗なA4サイズで印刷できます。
            </p>
        </div>

        <div
            class="flex-1 glass-panel rounded-2xl flex flex-col overflow-hidden border border-gray-200 shadow-sm relative">
            <div id="plan-chat-messages" class="flex-1 overflow-y-auto p-6 bg-slate-50 space-y-4">
                <!-- Messages will be injected here -->
            </div>
            <div class="p-4 bg-white border-t border-gray-100 flex-none">
                <form id="plan-chat-form" class="flex gap-3">
                    <input type="text" id="plan-user-input"
                        class="flex-1 border border-gray-300 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-theme transition-shadow"
                        placeholder="要望を入力（例：明日の算数の特訓メニューを作って）" autocomplete="off">
                    <button type="submit"
                        class="bg-theme text-white rounded-xl px-6 py-3 opacity-90 hover:opacity-100 transition shadow-sm font-bold flex items-center justify-center min-w-[100px]">送信</button>
                    <button type="button" onclick="clearPlanChat()"
                        class="bg-gray-100 text-gray-600 rounded-xl px-4 py-3 hover:bg-gray-200 transition text-sm font-bold"
                        title="チャット履歴を消去">🗑️</button>
                </form>
            </div>
        </div>
    </main>

    <script>
        // Planner Logic
        let planHistory = JSON.parse(localStorage.getItem('planHistory')) || [];

        function renderPlanChat() {
            const container = document.getElementById('plan-chat-messages');
            container.innerHTML = `<div class="message-bubble bg-white shadow-sm text-gray-700 border border-gray-200">🤖 AIコーチ：こんにちは！今日はどんな勉強計画を作りますか？<br><br><span class="text-gray-500 text-xs text-sm">（例：「明日の午前中だけの算数特訓メニューを作って」「日曜日の1日のスケジュールを立てて」など）</span></div>`;

            planHistory.forEach(msg => {
                const div = document.createElement('div');
                div.className = `message-bubble ${msg.isUser ? 'bg-theme text-white ml-auto relative' : 'bg-white shadow-sm text-gray-800 border border-gray-200 relative'} animate-fade-in`;

                // For AI messages, use marked if available or basic replace
                let contentHTML = msg.text.replace(/\\n/g, '<br>');
                // Replace basic markdown lists visually if possible
                contentHTML = contentHTML.replace(/- \\[ \\] /g, '<span class="inline-block w-4 h-4 border border-gray-400 rounded-sm mr-2 align-middle"></span>');
                contentHTML = contentHTML.replace(/- /g, '<span class="text-blue-500 mr-1">•</span>');

                div.innerHTML = contentHTML;
                container.appendChild(div);
            });
            container.scrollTop = container.scrollHeight;
        }

        document.getElementById('plan-chat-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const input = document.getElementById('plan-user-input');
            const text = input.value.trim();
            if (!text) return;
            input.value = '';

            planHistory.push({ isUser: true, text: text });
            localStorage.setItem('planHistory', JSON.stringify(planHistory));
            renderPlanChat();

            const loadingId = 'plan-loading-' + Date.now();
            const loadingDiv = document.createElement('div');
            loadingDiv.id = loadingId;
            loadingDiv.className = 'message-bubble bg-white shadow-sm text-gray-400 border border-gray-200 animate-fade-in flex items-center';
            loadingDiv.innerHTML = '考え中... <span class="animate-pulse ml-2 text-xl">🤖</span>';
            const container = document.getElementById('plan-chat-messages');
            container.appendChild(loadingDiv);
            container.scrollTop = container.scrollHeight;

            try {
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        question: text,
                        isPlanner: true,
                        history: planHistory.slice(-100).slice(0, -1)
                    })
                });

                document.getElementById(loadingId)?.remove();

                if (response.ok) {
                    const data = await response.json();
                    planHistory.push({ isUser: false, text: data.reply });
                    localStorage.setItem('planHistory', JSON.stringify(planHistory));
                    renderPlanChat();
                } else {
                    alert('エラーが発生しました。');
                    planHistory.pop();
                    localStorage.setItem('planHistory', JSON.stringify(planHistory));
                    renderPlanChat();
                }
            } catch (err) {
                document.getElementById(loadingId)?.remove();
                alert('通信エラーです。');
                planHistory.pop();
                localStorage.setItem('planHistory', JSON.stringify(planHistory));
                renderPlanChat();
            }
        });

        function clearPlanChat() {
            if (confirm("チャット履歴を消去して新しく始めますか？")) {
                planHistory = [];
                localStorage.setItem('planHistory', JSON.stringify(planHistory));
                renderPlanChat();
            }
        }

        function openPrintablePlan() {
            const aiMessages = planHistory.filter(m => !m.isUser);
            const latestPlan = aiMessages.length > 0 ? aiMessages[aiMessages.length - 1].text : "まだ計画が作成されていません。チャットで作成を依頼してください。";
            localStorage.setItem('printPlanContent', latestPlan);
            window.open('schedule_printable.html', '_blank');
        }

        // Init plan chat
        window.addEventListener('DOMContentLoaded', renderPlanChat);
    </script>
</body>

</html>
