<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <title>休日の集中時間割 ＆ 目標シート</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        /* A4印刷用の設定 */
        @page {
            size: A4;
            margin: 15mm 20mm;
        }

        body {
            font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", Meiryo, sans-serif;
            color: #333;
            line-height: 1.6;
            margin: 0;
            padding: 0;
            background-color: #fff;
        }

        .container {
            max-width: 100%;
            padding: 20px;
        }

        .markdown-body h1,
        .markdown-body h2,
        .markdown-body h3 {
            color: #8B1E3F;
            border-bottom: 2px solid #8B1E3F;
            padding-bottom: 5px;
            margin-top: 1.5rem;
            margin-bottom: 1rem;
        }

        .markdown-body table {
            width: 100%;
            border-collapse: collapse;
            margin: 1.5rem 0;
            font-size: 14px;
        }

        .markdown-body th,
        .markdown-body td {
            border: 1px solid #ccc;
            padding: 10px;
            text-align: left;
        }

        .markdown-body th {
            background-color: #fce4ec;
            color: #8B1E3F;
            text-align: center;
        }

        .markdown-body td {
            vertical-align: top;
        }

        .markdown-body ul,
        .markdown-body ol {
            padding-left: 20px;
            margin-bottom: 1.5rem;
        }

        .markdown-body li {
            margin-bottom: 5px;
        }

        .markdown-body p {
            margin-bottom: 1rem;
        }

        .markdown-body strong {
            color: #8B1E3F;
        }

        /* 印刷時のみ適用されるスタイル */
        @media print {
            .no-print {
                display: none;
            }
        }

        .print-btn {
            display: block;
            width: 250px;
            margin: 20px auto;
            padding: 12px;
            text-align: center;
            background-color: #8B1E3F;
            color: white;
            text-decoration: none;
            border-radius: 30px;
            font-weight: bold;
            cursor: pointer;
            border: none;
            font-size: 16px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            transition: opacity 0.2s;
        }

        .print-btn:hover {
            opacity: 0.9;
        }

        .watermark {
            text-align: right;
            font-size: 10px;
            color: #999;
            margin-top: 40px;
            border-top: 1px solid #eee;
            padding-top: 10px;
        }
    </style>
</head>

<body>
    <button onclick="window.print()" class="print-btn no-print">🖨️ この計画表をA4で印刷する</button>

    <div class="container" id="printable-content">
        <div class="markdown-body" id="rendered-content">
            <!-- 読み込み中、またはエラーメッセージが出ます -->
            <p style="text-align: center; color: #666; margin-top: 50px;">計画データを読み込んでいます...</p>
        </div>
        <div class="watermark">
            Generated by 中学受験ナビ - AI勉強計画アシスタント
        </div>
    </div>

    <script>
        // ページロード時に、親画面（またはローカルストレージ）から最新の計画データを取得してMarkdownをHTMLに変換
        window.onload = function () {
            const content = localStorage.getItem('printPlanContent');
            const targetDiv = document.getElementById('rendered-content');

            if (content && content.trim() !== '') {
                // Table extension for marked to make it look nicer if needed
                targetDiv.innerHTML = marked.parse(content);

                // 特定のテキスト（チェックボックス関連）を見やすく変換する簡単なハック
                let html = targetDiv.innerHTML;
                // 印刷時に薄くならないよう線を太く、色を真っ黒(#000)に変更
                html = html.replace(/\[ \]/g, '<span style="display:inline-block; width:18px; height:18px; border:2px solid #000; border-radius:3px; vertical-align:middle; margin-right:5px; box-sizing:border-box;"></span>');
                html = html.replace(/\[x\]/g, '<span style="display:inline-block; width:18px; height:18px; border:2px solid #000; background-color: #eee; border-radius:3px; vertical-align:middle; margin-right:5px; box-sizing:border-box; text-align:center; line-height:14px; font-weight:bold;">✔</span>');
                targetDiv.innerHTML = html;
            } else {
                targetDiv.innerHTML = `
                <div style="text-align:center; padding: 40px;">
                    <h2 style="color:#e11d48; border:none;">⚠️ 計画データが見つかりません</h2>
                    <p>元の「中学受験ナビ」ページに戻り、勉強計画作成アシスタントのチャットでAIにスケジュールを作成してもらってから、再度このボタンを押してください。</p>
                </div>`;
            }
        };
    </script>
</body>

</html>
