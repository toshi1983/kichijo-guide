<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>サピックステスト解説</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --theme-color: #6366f1;
            /* indigo-500 */
            --theme-light: #e0e7ff;
            /* indigo-100 */
            --bubble-bot: #f8fafc;
            --bubble-user: #e0e7ff;
        }

        body {
            font-family: 'Zen Maru Gothic', sans-serif;
            background: linear-gradient(135deg, #eef2ff 0%, #f1f5f9 100%);
            min-height: 100vh;
        }

        .chat-container {
            height: calc(100dvh - 160px);
            display: flex;
            flex-direction: column;
        }

        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 1rem;
            scroll-behavior: smooth;
        }

        .bubble-bot {
            background: var(--bubble-bot);
            border: 1.5px solid #cbd5e1;
            border-radius: 20px 20px 20px 4px;
        }

        .bubble-user {
            background: var(--bubble-user);
            border: 1.5px solid #a5b4fc;
            border-radius: 20px 20px 4px 20px;
        }

        .typing-dot {
            width: 8px;
            height: 8px;
            background: var(--theme-color);
            border-radius: 50%;
            animation: bounce 1.2s infinite;
        }

        .typing-dot:nth-child(2) {
            animation-delay: 0.2s;
        }

        .typing-dot:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes bounce {

            0%,
            80%,
            100% {
                transform: scale(0.8);
                opacity: 0.6;
            }

            40% {
                transform: scale(1.2);
                opacity: 1;
            }
        }

        .fade-in {
            animation: fadeUp 0.25s ease-out;
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(15px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .input-bar {
            background: white;
            border-top: 1px solid #e2e8f0;
            box-shadow: 0 -4px 20px rgba(0, 0, 0, 0.04);
        }

        .messages-area::-webkit-scrollbar {
            width: 4px;
        }

        .messages-area::-webkit-scrollbar-thumb {
            background: var(--theme-light);
            border-radius: 4px;
        }

        .header-bg {
            background: linear-gradient(135deg, #4f46e5, #818cf8);
        }

        .markdown-reply p {
            margin-bottom: 0.5em;
        }

        .markdown-reply li {
            margin-left: 1.2em;
            list-style: disc;
        }

        .markdown-reply br {
            display: block;
            margin-bottom: 0.2em;
        }

        .markdown-reply strong {
            font-weight: 700;
            color: #1e3a8a;
        }
    </style>
</head>

<body>

    <!-- Header -->
    <header class="header-bg shadow-lg z-50 sticky top-0">
        <div class="container mx-auto px-4 py-3 flex items-center gap-4 max-w-3xl">
            <a href="index.html"
                class="text-white hover:opacity-80 transition text-sm font-bold flex items-center gap-1">
                <span>◀</span> <span class="hidden sm:inline">トップへ</span>
            </a>
            <div class="flex items-center gap-3 flex-1">
                <div
                    class="w-10 h-10 bg-white rounded-full flex items-center justify-center shadow-md select-none text-2xl text-indigo-500 pb-1">
                    👨‍🏫
                </div>
                <div>
                    <h1 class="text-white font-bold text-lg leading-tight">サピックステスト解説</h1>
                    <p class="text-indigo-100 text-xs">AIカリスマ講師</p>
                </div>
            </div>
            <button onclick="clearChat()"
                class="text-white opacity-70 hover:opacity-100 transition text-xs border border-white border-opacity-40 rounded-full px-3 py-1">
                クリア
            </button>
        </div>
    </header>

    <!-- Test Selector -->
    <div class="bg-indigo-50 border-b border-indigo-100 shadow-sm z-40 sticky">
        <div
            class="container mx-auto px-4 py-2 max-w-3xl flex flex-col sm:flex-row gap-2 sm:gap-4 items-center justify-between">
            <div class="flex gap-2 w-full sm:w-auto flex-1">
                <select id="test-period"
                    class="bg-white border text-sm text-gray-700 border-indigo-200 rounded-lg px-3 py-1.5 focus:outline-none focus:border-indigo-500 w-full sm:w-auto shadow-inner">
                    <option value="" disabled selected>テスト時期を選ぶ...</option>
                    <option value="2026_03_kumiwake">2026年3月 組分けテスト</option>
                </select>
                <select id="subject"
                    class="bg-white border text-sm text-gray-700 border-indigo-200 rounded-lg px-3 py-1.5 focus:outline-none focus:border-indigo-500 w-full sm:w-auto shadow-inner">
                    <option value="" disabled selected>科目を選ぶ...</option>
                    <option value="国語">国語</option>
                    <option value="算数">算数</option>
                    <option value="理科">理科</option>
                    <option value="社会">社会</option>
                </select>
            </div>
        </div>
    </div>

    <!-- Chat Area -->
    <div class="chat-container max-w-3xl mx-auto w-full">
        <div class="messages-area" id="messages">
            <!-- Initial greeting -->
            <div class="flex gap-3 mb-4 fade-in">
                <div
                    class="w-16 h-16 sm:w-20 sm:h-20 bg-indigo-100 rounded-3xl flex items-center justify-center shadow-inner flex-none text-4xl">
                    👨‍🏫
                </div>
                <div class="bubble-bot p-4 max-w-[85%] text-gray-800 text-sm leading-relaxed">
                    こんにちは！わたしはSAPIXテスト解説を担当するAI講師です。<br>
                    まずは上のメニューから<strong>『テストの時期』</strong>と<strong>『科目』</strong>を選んでくださいね。<br>
                    <br>
                    「大問3の(2)がわからない」「あの問題の解き方のコツを教えて」など、なんでも聞いてください！📝
                </div>
            </div>
        </div>

        <!-- Input Bar -->
        <div class="input-bar px-3 py-3">
            <div class="flex items-end gap-2">
                <!-- Text Input -->
                <div
                    class="flex-1 bg-gray-50 border-2 border-gray-200 rounded-2xl px-4 py-2.5 focus-within:border-indigo-400 transition">
                    <textarea id="user-input"
                        class="w-full bg-transparent text-sm resize-none focus:outline-none max-h-32 leading-relaxed"
                        placeholder="質問を入れてね（例：大問1の(4)の解き方を教えて）" rows="1" oninput="autoResize(this)"></textarea>
                </div>

                <!-- Send Button -->
                <button onclick="sendMessage()" id="send-btn"
                    class="flex-none w-11 h-11 bg-indigo-500 hover:bg-indigo-600 disabled:bg-indigo-300 text-white rounded-full flex items-center justify-center text-xl shadow-sm transition"
                    title="送信">
                    ➤
                </button>
            </div>
            <p class="text-center text-xs text-gray-400 mt-1">Shift+Enterで改行 / Enterで送信</p>
        </div>
    </div>

    <script>
        let conversationHistory = [];
        let isComposing = false;

        const inputEl = document.getElementById('user-input');
        inputEl.addEventListener('compositionstart', () => { isComposing = true; });
        inputEl.addEventListener('compositionend', () => { isComposing = false; });
        inputEl.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey && !isComposing) {
                e.preventDefault();
                sendMessage();
            }
        });

        function autoResize(el) {
            el.style.height = 'auto';
            el.style.height = Math.min(el.scrollHeight, 128) + 'px';
        }

        async function sendMessage() {
            const input = document.getElementById('user-input');
            const text = input.value.trim();
            const testPeriod = document.getElementById('test-period').value;
            const subject = document.getElementById('subject').value;

            if (!text) return;

            if (!testPeriod || !subject) {
                alert("テスト時期と科目を選んでください。");
                return;
            }

            const sendBtn = document.getElementById('send-btn');
            sendBtn.disabled = true;

            appendUserMessage(text);
            const questionText = text;

            input.value = '';
            autoResize(input);

            const typingId = 'typing-' + Date.now();
            appendTyping(typingId);

            try {
                const response = await fetch('/api/sapix_chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        question: questionText,
                        testPeriod: testPeriod,
                        subject: subject,
                        history: conversationHistory
                    })
                });

                document.getElementById(typingId)?.remove();

                let data = null;
                try { data = await response.json(); } catch (e) { }

                if (response.ok && data?.reply) {
                    appendBotMessage(data.reply);
                    conversationHistory.push({ role: 'user', text: questionText });
                    conversationHistory.push({ role: 'bot', text: data.reply });
                    if (conversationHistory.length > 20) conversationHistory = conversationHistory.slice(-20);
                } else {
                    const errMsg = data?.reply || data?.error || `HTTPエラー ${response.status}`;
                    appendBotMessage(`👨‍🏫 うーむ、エラーが起きてしまったようです。\n\n詳細: ${errMsg}`);
                }
            } catch (err) {
                document.getElementById(typingId)?.remove();
                appendBotMessage(`👨‍🏫 通信エラーのようです😥\n\nインターネット接続を確認してください。\n詳細: ${err.message}`);
            } finally {
                sendBtn.disabled = false;
                input.focus();
            }
        }

        function appendUserMessage(text) {
            const messages = document.getElementById('messages');
            const div = document.createElement('div');
            div.className = 'flex flex-row-reverse gap-3 mb-4 fade-in';
            const content = `<div class="text-sm text-gray-800 leading-relaxed">${escHtml(text).replace(/\n/g, '<br>')}</div>`;
            div.innerHTML = `
                <div class="text-2xl mt-1 select-none">👤</div>
                <div class="bubble-user p-4 max-w-[85%] flex flex-col items-end">${content}</div>
            `;
            messages.appendChild(div);
            messages.scrollTop = messages.scrollHeight;
        }

        function appendBotMessage(text) {
            const messages = document.getElementById('messages');
            const div = document.createElement('div');
            div.className = 'flex gap-3 mb-4 fade-in';
            let html = escHtml(text)
                .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
                .replace(/\*(.*?)\*/g, '<em>$1</em>')
                .replace(/^- (.+)$/gm, '<li>$1</li>')
                .replace(/(<li>.*<\/li>)/s, '<ul class="my-1 space-y-0.5">$1</ul>')
                .replace(/\n/g, '<br>');

            div.innerHTML = `
                <div class="w-16 h-16 sm:w-20 sm:h-20 bg-indigo-100 rounded-3xl flex items-center justify-center shadow-inner flex-none text-4xl select-none">
                    👨‍🏫
                </div>
                <div class="bubble-bot p-4 max-w-[85%] text-gray-800 text-sm leading-relaxed markdown-reply">${html}</div>
            `;
            messages.appendChild(div);
            messages.scrollTop = messages.scrollHeight;
        }

        function appendTyping(id) {
            const messages = document.getElementById('messages');
            const div = document.createElement('div');
            div.id = id;
            div.className = 'flex gap-3 mb-4';
            div.innerHTML = `
                <div class="w-16 h-16 sm:w-20 sm:h-20 bg-indigo-100 rounded-3xl flex items-center justify-center shadow-inner flex-none text-4xl select-none">
                    👨‍🏫
                </div>
                <div class="bubble-bot p-4 flex items-center gap-2">
                    <div class="typing-dot"></div>
                    <div class="typing-dot"></div>
                    <div class="typing-dot"></div>
                </div>
            `;
            messages.appendChild(div);
            messages.scrollTop = messages.scrollHeight;
        }

        function clearChat() {
            if (!confirm('会話をリセットしますか？')) return;
            document.getElementById('messages').innerHTML = `
                <div class="flex gap-3 mb-4 fade-in">
                    <div class="w-16 h-16 sm:w-20 sm:h-20 bg-indigo-100 rounded-3xl flex items-center justify-center shadow-inner flex-none text-4xl select-none">
                        👨‍🏫
                    </div>
                    <div class="bubble-bot p-4 max-w-[85%] text-gray-800 text-sm leading-relaxed">
                        こんにちは！わたしはSAPIXテスト解説を担当するAI講師です。<br>
                        まずは上のメニューから<strong>『テストの時期』</strong>と<strong>『科目』</strong>を選んでくださいね。<br><br>
                        「大問3の(2)がわからない」「あの問題の解き方のコツを教えて」など、なんでも聞いてください！📝
                    </div>
                </div>
            `;
            conversationHistory = [];
            document.getElementById('user-input').value = '';
            autoResize(document.getElementById('user-input'));
        }

        function escHtml(str) {
            return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
        }
    </script>
</body>

</html>
