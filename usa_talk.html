<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>うさトーク - 勉強おたすけBot</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --rabbit: #f9a8d4;
            /* pink-300 */
            --rabbit-dark: #ec4899;
            /* pink-500 */
            --bubble-bot: #fff0f7;
            --bubble-user: #eff6ff;
        }

        body {
            font-family: 'Zen Maru Gothic', sans-serif;
            background: linear-gradient(135deg, #fdf2f8 0%, #eff6ff 100%);
            min-height: 100vh;
        }

        .chat-container {
            height: calc(100dvh - 140px);
            display: flex;
            flex-direction: column;
        }

        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 1rem;
            scroll-behavior: smooth;
        }

        /* Bot bubble */
        .bubble-bot {
            background: var(--bubble-bot);
            border: 1.5px solid #fbcfe8;
            border-radius: 20px 20px 20px 4px;
        }

        /* User bubble */
        .bubble-user {
            background: var(--bubble-user);
            border: 1.5px solid #bfdbfe;
            border-radius: 20px 20px 4px 20px;
        }

        /* Typing dots */
        .typing-dot {
            width: 8px;
            height: 8px;
            background: var(--rabbit-dark);
            border-radius: 50%;
            animation: bounce 1.2s infinite;
        }

        .typing-dot:nth-child(2) {
            animation-delay: 0.2s;
        }

        .typing-dot:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes bounce {

            0%,
            80%,
            100% {
                transform: scale(0.8);
                opacity: 0.6;
            }

            40% {
                transform: scale(1.2);
                opacity: 1;
            }
        }

        /* Image preview */
        .img-preview {
            max-width: 220px;
            max-height: 180px;
            border-radius: 12px;
            object-fit: cover;
            border: 2px solid #fbcfe8;
        }

        /* Camera menu overlay */
        .image-menu {
            background: rgba(0, 0, 0, 0.4);
            position: fixed;
            inset: 0;
            z-index: 100;
            display: flex;
            align-items: flex-end;
            justify-content: center;
        }

        .image-menu-panel {
            background: white;
            border-radius: 24px 24px 0 0;
            padding: 1.5rem;
            width: 100%;
            max-width: 600px;
        }

        .fade-in {
            animation: fadeUp 0.25s ease-out;
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(15px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Input Bar */
        .input-bar {
            background: white;
            border-top: 1px solid #fce7f3;
            box-shadow: 0 -4px 20px rgba(0, 0, 0, 0.06);
        }

        /* Scrollbar */
        .messages-area::-webkit-scrollbar {
            width: 4px;
        }

        .messages-area::-webkit-scrollbar-thumb {
            background: #fbcfe8;
            border-radius: 4px;
        }

        /* Rabbit mascot */
        .mascot {
            font-size: 2rem;
        }

        .header-bg {
            background: linear-gradient(135deg, #ec4899, #f472b6);
        }

        .markdown-reply p {
            margin-bottom: 0.5em;
        }

        .markdown-reply li {
            margin-left: 1.2em;
            list-style: disc;
        }

        .markdown-reply br {
            display: block;
            margin-bottom: 0.2em;
        }
    </style>
</head>

<body>

    <!-- Header -->
    <header class="header-bg shadow-lg z-50 sticky top-0">
        <div class="container mx-auto px-4 py-3 flex items-center gap-4 max-w-3xl">
            <a href="index.html"
                class="text-white hover:opacity-80 transition text-sm font-bold flex items-center gap-1">
                <span>◀</span> <span class="hidden sm:inline">トップへ</span>
            </a>
            <div class="flex items-center gap-3 flex-1">
                <div
                    class="w-10 h-10 bg-white rounded-full flex items-center justify-center text-2xl shadow-md select-none">
                    🐰</div>
                <div>
                    <h1 class="text-white font-bold text-lg leading-tight">うさトーク</h1>
                    <p class="text-pink-100 text-xs">勉強おたすけBot「うさぴょん」</p>
                </div>
            </div>
            <button onclick="clearChat()"
                class="text-white opacity-70 hover:opacity-100 transition text-xs border border-white border-opacity-40 rounded-full px-3 py-1">
                クリア
            </button>
        </div>
    </header>

    <!-- Chat Area -->
    <div class="chat-container max-w-3xl mx-auto w-full">
        <div class="messages-area" id="messages">
            <!-- Initial greeting -->
            <div class="flex gap-3 mb-4 fade-in">
                <div class="text-3xl mt-1 select-none">🐰</div>
                <div class="bubble-bot p-4 max-w-[85%] text-gray-800 text-sm leading-relaxed">
                    やあ！ぼくうさぴょんだぴょん🐰✨<br>
                    算数・国語・理科・社会、なんでも聞いてね！<br>
                    <br>
                    テキストで質問するか、<strong>問題の写真を撮って送ってくれる</strong>だけでも解説するよ📝
                </div>
            </div>
        </div>

        <!-- Image Preview Strip (shows when image is selected) -->
        <div id="preview-strip" class="hidden px-4 py-2 bg-pink-50 border-t border-pink-100 flex items-center gap-3">
            <img id="preview-img" src="" alt="選択画像" class="img-preview" style="max-height: 80px;">
            <div class="flex-1 text-xs text-gray-600 truncate" id="preview-name"></div>
            <button onclick="clearImage()"
                class="text-pink-500 font-bold hover:text-pink-700 transition text-lg">✕</button>
        </div>

        <!-- Input Bar -->
        <div class="input-bar px-3 py-3">
            <div class="flex items-end gap-2">
                <!-- Image Button -->
                <button onclick="showImageMenu()"
                    class="flex-none w-11 h-11 bg-pink-100 hover:bg-pink-200 text-pink-600 rounded-full flex items-center justify-center text-xl shadow-sm transition"
                    id="img-btn" title="画像を追加">
                    📷
                </button>

                <!-- Text Input -->
                <div
                    class="flex-1 bg-gray-50 border-2 border-gray-200 rounded-2xl px-4 py-2.5 focus-within:border-pink-300 transition">
                    <textarea id="user-input"
                        class="w-full bg-transparent text-sm resize-none focus:outline-none max-h-32 leading-relaxed"
                        placeholder="質問を入れてね（例：この算数の問題がわからない）" rows="1" onkeydown="handleKey(event)"
                        oninput="autoResize(this)"></textarea>
                </div>

                <!-- Send Button -->
                <button onclick="sendMessage()" id="send-btn"
                    class="flex-none w-11 h-11 bg-pink-500 hover:bg-pink-600 disabled:bg-pink-200 text-white rounded-full flex items-center justify-center text-xl shadow-sm transition"
                    title="送信">
                    ➤
                </button>
            </div>
            <p class="text-center text-xs text-gray-400 mt-1">Shift+Enterで改行 / Enterで送信</p>
        </div>
    </div>

    <!-- Image Source Menu -->
    <div class="image-menu hidden" id="image-menu" onclick="hideImageMenu(event)">
        <div class="image-menu-panel fade-in" onclick="event.stopPropagation()">
            <h2 class="font-bold text-lg text-gray-800 mb-4 text-center">画像の追加方法を選んでね 📸</h2>
            <div class="flex flex-col gap-3">
                <button onclick="openGallery()"
                    class="w-full flex items-center gap-4 bg-pink-50 hover:bg-pink-100 border border-pink-200 rounded-2xl px-5 py-4 text-left transition">
                    <span class="text-3xl">🖼️</span>
                    <div>
                        <div class="font-bold text-gray-800">写真から追加</div>
                        <div class="text-xs text-gray-500 mt-0.5">カメラロール・アルバムから選ぶ</div>
                    </div>
                </button>
                <button onclick="openCamera()"
                    class="w-full flex items-center gap-4 bg-blue-50 hover:bg-blue-100 border border-blue-200 rounded-2xl px-5 py-4 text-left transition">
                    <span class="text-3xl">📷</span>
                    <div>
                        <div class="font-bold text-gray-800">撮影して追加</div>
                        <div class="text-xs text-gray-500 mt-0.5">カメラを起動して今すぐ撮る</div>
                    </div>
                </button>
            </div>
            <button onclick="hideImageMenu()"
                class="w-full mt-4 text-gray-500 font-bold py-3 hover:text-gray-700 transition">キャンセル</button>
        </div>
    </div>

    <!-- Hidden File Inputs -->
    <input type="file" id="file-gallery" accept="image/*" class="hidden" onchange="handleImageSelect(event)">
    <input type="file" id="file-camera" accept="image/*" capture="environment" class="hidden"
        onchange="handleImageSelect(event)">

    <script>
        let conversationHistory = [];
        let selectedImageBase64 = null;
        let selectedMimeType = null;

        function autoResize(el) {
            el.style.height = 'auto';
            el.style.height = Math.min(el.scrollHeight, 128) + 'px';
        }

        function handleKey(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        }

        function showImageMenu() {
            document.getElementById('image-menu').classList.remove('hidden');
        }
        function hideImageMenu(e) {
            document.getElementById('image-menu').classList.add('hidden');
        }
        function openGallery() {
            hideImageMenu();
            document.getElementById('file-gallery').click();
        }
        function openCamera() {
            hideImageMenu();
            document.getElementById('file-camera').click();
        }

        function handleImageSelect(e) {
            const file = e.target.files[0];
            if (!file) return;
            selectedMimeType = file.type || 'image/jpeg';

            const reader = new FileReader();
            reader.onload = (ev) => {
                const result = ev.target.result; // data:...;base64,...
                selectedImageBase64 = result.split(',')[1];
                document.getElementById('preview-img').src = result;
                document.getElementById('preview-name').textContent = file.name;
                document.getElementById('preview-strip').classList.remove('hidden');
            };
            reader.readAsDataURL(file);
            e.target.value = ''; // reset
        }

        function clearImage() {
            selectedImageBase64 = null;
            selectedMimeType = null;
            document.getElementById('preview-strip').classList.add('hidden');
            document.getElementById('preview-img').src = '';
        }

        async function sendMessage() {
            const input = document.getElementById('user-input');
            const text = input.value.trim();
            if (!text && !selectedImageBase64) return;

            const sendBtn = document.getElementById('send-btn');
            sendBtn.disabled = true;

            // Display user message
            const previewSrc = document.getElementById('preview-img').src;
            appendUserMessage(text, selectedImageBase64 ? previewSrc : null);

            const question = text;
            const imgB64 = selectedImageBase64;
            const mime = selectedMimeType;

            input.value = '';
            autoResize(input);
            clearImage();

            // Show typing indicator
            const typingId = 'typing-' + Date.now();
            appendTyping(typingId);

            try {
                const response = await fetch('/api/usa_chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        question,
                        imageBase64: imgB64 || null,
                        mimeType: mime || null,
                        history: conversationHistory
                    })
                });

                document.getElementById(typingId)?.remove();

                if (response.ok) {
                    const data = await response.json();
                    const reply = data.reply;
                    appendBotMessage(reply);
                    conversationHistory.push({ role: 'user', text: question || '(画像)' });
                    conversationHistory.push({ role: 'bot', text: reply });
                    if (conversationHistory.length > 20) conversationHistory = conversationHistory.slice(-20);
                } else {
                    appendBotMessage('ごめんね、エラーが起きちゃった…もう一度試してみて！🐰');
                }
            } catch (err) {
                document.getElementById(typingId)?.remove();
                appendBotMessage('通信エラーだぴょん😥 ネット接続を確認してね。');
            }

            sendBtn.disabled = false;
            input.focus();
        }

        function appendUserMessage(text, imgSrc) {
            const messages = document.getElementById('messages');
            const div = document.createElement('div');
            div.className = 'flex flex-row-reverse gap-3 mb-4 fade-in';
            let content = '';
            if (imgSrc) {
                content += `<img src="${imgSrc}" alt="送信画像" class="img-preview mb-2">`;
            }
            if (text) {
                content += `<div class="text-sm text-gray-800 leading-relaxed">${escHtml(text).replace(/\n/g, '<br>')}</div>`;
            }
            div.innerHTML = `
                <div class="text-2xl mt-1 select-none">👤</div>
                <div class="bubble-user p-4 max-w-[85%] flex flex-col items-end">${content}</div>
            `;
            messages.appendChild(div);
            messages.scrollTop = messages.scrollHeight;
        }

        function appendBotMessage(text) {
            const messages = document.getElementById('messages');
            const div = document.createElement('div');
            div.className = 'flex gap-3 mb-4 fade-in';
            // Simple markdown-ish formatting
            let html = escHtml(text)
                .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
                .replace(/\*(.*?)\*/g, '<em>$1</em>')
                .replace(/^- (.+)$/gm, '<li>$1</li>')
                .replace(/(<li>.*<\/li>)/s, '<ul class="my-1 space-y-0.5">$1</ul>')
                .replace(/\n/g, '<br>');

            div.innerHTML = `
                <div class="text-3xl mt-1 select-none">🐰</div>
                <div class="bubble-bot p-4 max-w-[85%] text-gray-800 text-sm leading-relaxed markdown-reply">${html}</div>
            `;
            messages.appendChild(div);
            messages.scrollTop = messages.scrollHeight;
        }

        function appendTyping(id) {
            const messages = document.getElementById('messages');
            const div = document.createElement('div');
            div.id = id;
            div.className = 'flex gap-3 mb-4';
            div.innerHTML = `
                <div class="text-3xl mt-1 select-none">🐰</div>
                <div class="bubble-bot p-4 flex items-center gap-2">
                    <div class="typing-dot"></div>
                    <div class="typing-dot"></div>
                    <div class="typing-dot"></div>
                </div>
            `;
            messages.appendChild(div);
            messages.scrollTop = messages.scrollHeight;
        }

        function clearChat() {
            if (!confirm('会話をリセットしますか？')) return;
            document.getElementById('messages').innerHTML = `
                <div class="flex gap-3 mb-4 fade-in">
                    <div class="text-3xl mt-1 select-none">🐰</div>
                    <div class="bubble-bot p-4 max-w-[85%] text-gray-800 text-sm leading-relaxed">
                        やあ！ぼくうさぴょんだぴょん🐰✨<br>
                        算数・国語・理科・社会、なんでも聞いてね！<br><br>
                        テキストで質問するか、<strong>問題の写真を撮って送ってくれる</strong>だけでも解説するよ📝
                    </div>
                </div>
            `;
            conversationHistory = [];
            clearImage();
        }

        function escHtml(str) {
            return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
        }
    </script>
</body>

</html>
